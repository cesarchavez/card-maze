<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create Account · {{ app_title }}</title>

  <script>
    (function () {
      var t = localStorage.getItem('cardmaze-theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>

  <link rel="stylesheet" href="/static/vendor/bootstrap/css/bootstrap.min.css">

  <style>
    :root,
    [data-theme="dark"] {
      --bg-base:      #05080f;
      --body-glow:    rgba(29,78,216,.22);
      --panel-bg:     rgba(13,22,39,.75);
      --panel-border: rgba(59,130,246,.35);
      --text-primary: #f1f5f9;
      --text-muted:   #64748b;
      --input-bg:     rgba(255,255,255,.05);
      --input-border: rgba(59,130,246,.3);
      --input-focus:  rgba(59,130,246,.6);
      --accent:       #3b82f6;
      --accent-bright:#60a5fa;
      --btn-from:     #1d4ed8;
      --btn-to:       #3b82f6;
      --btn-shadow:   rgba(59,130,246,.35);
      --err-bg:       rgba(239,68,68,.1);
      --err-border:   rgba(239,68,68,.3);
      --err-text:     #fca5a5;
      --ok-bg:        rgba(34,197,94,.1);
      --ok-border:    rgba(34,197,94,.3);
      --ok-text:      #86efac;
    }

    [data-theme="light"] {
      --bg-base:      #f4f0e6;
      --body-glow:    rgba(180,140,60,.2);
      --panel-bg:     rgba(255,252,245,.92);
      --panel-border: rgba(180,140,11,.35);
      --text-primary: #1c1810;
      --text-muted:   #78716c;
      --input-bg:     rgba(0,0,0,.04);
      --input-border: rgba(180,140,11,.3);
      --input-focus:  rgba(180,140,11,.5);
      --accent:       #b8860b;
      --accent-bright:#d4a017;
      --btn-from:     #8b6914;
      --btn-to:       #b8860b;
      --btn-shadow:   rgba(180,140,11,.3);
      --err-bg:       rgba(180,60,60,.08);
      --err-border:   rgba(180,60,60,.25);
      --err-text:     #b91c1c;
      --ok-bg:        rgba(34,197,94,.08);
      --ok-border:    rgba(34,197,94,.25);
      --ok-text:      #15803d;
    }

    *, *::before, *::after { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 1.5rem;
      background-color: var(--bg-base);
      background-image: radial-gradient(ellipse 80% 50% at 50% -10%,
                          var(--body-glow) 0%, transparent 70%);
      font-family: 'Inter', system-ui, sans-serif;
      color: var(--text-primary);
    }

    .shell { width: 100%; max-width: 420px; }

    .panel {
      background:    var(--panel-bg);
      border:        1px solid var(--panel-border);
      border-radius: 20px;
      padding:       2.5rem 2rem;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }

    .eyebrow {
      font-size:      0.7rem;
      font-weight:    800;
      letter-spacing: 2px;
      text-transform: uppercase;
      color:          var(--accent-bright);
      margin-bottom:  0.5rem;
    }

    .panel-title {
      font-size:      clamp(1.5rem, 5vw, 2rem);
      font-weight:    900;
      letter-spacing: -0.03em;
      line-height:    1.1;
      margin-bottom:  0.4rem;
    }

    .panel-subtitle {
      font-size:   0.88rem;
      color:       var(--text-muted);
      margin-bottom: 2rem;
    }

    .field-label {
      display:       block;
      font-size:     0.78rem;
      font-weight:   700;
      letter-spacing: 0.5px;
      text-transform: uppercase;
      color:         var(--text-muted);
      margin-bottom: 0.4rem;
    }

    .form-control {
      width:            100%;
      background:       var(--input-bg);
      border:           1px solid var(--input-border);
      border-radius:    10px;
      padding:          0.6rem 0.9rem;
      color:            var(--text-primary);
      font-size:        0.95rem;
      transition:       border-color .15s, box-shadow .15s;
      outline:          none;
    }

    .form-control::placeholder { color: var(--text-muted); opacity: .7; }

    .form-control:focus {
      border-color: var(--input-focus);
      box-shadow:   0 0 0 3px color-mix(in srgb, var(--input-focus) 25%, transparent);
    }

    .alert-error {
      background:    var(--err-bg);
      border:        1px solid var(--err-border);
      color:         var(--err-text);
      border-radius: 10px;
      padding:       0.7rem 1rem;
      font-size:     0.88rem;
      margin-bottom: 1.4rem;
    }

    .alert-success {
      background:    var(--ok-bg);
      border:        1px solid var(--ok-border);
      color:         var(--ok-text);
      border-radius: 10px;
      padding:       0.7rem 1rem;
      font-size:     0.88rem;
      margin-bottom: 1.4rem;
    }

    .btn-login {
      display:        block;
      width:          100%;
      padding:        0.7rem 1rem;
      border:         none;
      border-radius:  12px;
      background:     linear-gradient(135deg, var(--btn-from), var(--btn-to));
      color:          #fff;
      font-size:      0.95rem;
      font-weight:    700;
      letter-spacing: 0.3px;
      cursor:         pointer;
      box-shadow:     0 4px 18px var(--btn-shadow);
      transition:     opacity .15s, transform .1s;
    }
    .btn-login:hover  { opacity: .9; }
    .btn-login:active { transform: scale(.98); }

    .login-footer {
      margin-top:  1.5rem;
      font-size:   0.78rem;
      color:       var(--text-muted);
      text-align:  center;
      line-height: 1.6;
    }

    .login-footer a {
      color: var(--accent-bright);
      text-decoration: none;
    }
    .login-footer a:hover { text-decoration: underline; }
  </style>
</head>

<body>
  <div class="shell">
    <div class="panel">
      <p class="eyebrow">{{ app_title }}</p>
      <h1 class="panel-title">Create account</h1>
      <p class="panel-subtitle">Fill in the details below to register as a new player.</p>

      {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
          <div class="alert-{{ 'success' if category == 'success' else 'error' }}" role="alert">{{ message }}</div>
        {% endfor %}
      {% endwith %}

      <form method="post" action="/new-user" novalidate>
        <div class="mb-3">
          <label class="field-label" for="username">Username</label>
          <input
            type="text"
            id="username"
            name="username"
            class="form-control"
            autocomplete="username"
            autofocus
            required>
        </div>

        <div class="mb-3">
          <label class="field-label" for="email">Email</label>
          <input
            type="email"
            id="email"
            name="email"
            class="form-control"
            autocomplete="email"
            required>
        </div>

        <div class="mb-4">
          <label class="field-label" for="password">Password</label>
          <input
            type="password"
            id="password"
            name="password"
            class="form-control"
            autocomplete="new-password"
            required>
        </div>

        <button type="submit" class="btn-login">Create account →</button>
      </form>
    </div>

    <p class="login-footer">
      Already have an account? <a href="{{ url_for('login') }}">Sign in</a>
    </p>
  </div>

  <script src="/static/vendor/bootstrap/js/bootstrap.bundle.min.js"></script>
  <script src="/static/js/theme.js"></script>
</body>
</html>
